<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로젝트 경험</title>
  <link rel="stylesheet" href="assets/style/nav.css">
  <link rel="stylesheet" href="assets/style/projects.css">
</head>
<body>
  <main class="projects-page">
    <section class="summary-view">
      <nav class="top-nav">
        <a href="index.html">메인</a>
        <a href="projects.html">프로젝트 목록</a>
        <a href="aboutme.html">자기소개</a>
        <a href="tech-stack.html">기술스택</a>
      </nav>
      
      <div class="projects-badge">PROJECTS</div>
      <h1 class="projects-title">프로젝트 경험</h1>

      <div class="project-tabs" role="tablist" aria-label="프로젝트 카테고리">
        <button class="tab-btn is-active" type="button" role="tab" aria-selected="true" data-filter="all">전체</button>
        <button class="tab-btn" type="button" role="tab" aria-selected="false" data-filter="풀스택">풀스택</button>
        <button class="tab-btn" type="button" role="tab" aria-selected="false" data-filter="앱">앱</button>
        <button class="tab-btn" type="button" role="tab" aria-selected="false" data-filter="백엔드">백엔드</button>
      </div>

      <section class="summary-grid" id="projectGrid"></section>
    </section>

    <section class="detail-view" aria-label="프로젝트 상세 정보">
      <article class="project-detail-card">
        <div class="detail-header">
          <div class="detail-title-wrap">
            <div class="detail-icon" aria-hidden="true" id="detailIcon"></div>
            <div>
              <h2 class="detail-name" id="detailName"></h2>
              <div class="detail-meta" id="detailMeta"></div>
            </div>
          </div>
          <button class="detail-close" type="button" aria-label="닫기">×</button>
        </div>

        <div class="detail-body">
          <section class="section-block">
            <h3 class="section-title">프로젝트 목적</h3>
            <p class="section-text" id="detailPurpose"></p>
          </section>

          <section class="section-block">
            <h3 class="section-title">담당 역할</h3>
            <ul class="detail-list" id="detailRoles"></ul>
          </section>

          <section class="section-block">
            <h3 class="trouble-title">🔧 트러블슈팅</h3>
            <div class="trouble-box" id="detailTrouble"></div>
          </section>

          <section class="section-block">
            <h3 class="section-title">사용 기술</h3>
            <div class="stack-list" id="detailStacks"></div>
          </section>
        </div>

        <div class="detail-actions">
          <a class="action-btn github" id="detailGithubLink" href="#" target="_blank" rel="noreferrer noopener">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
              <path d="M12 .5C5.65.5.5 5.65.5 12a11.5 11.5 0 0 0 7.86 10.92c.58.1.79-.25.79-.56 0-.28-.01-1.03-.02-2.03-3.2.7-3.88-1.54-3.88-1.54-.53-1.33-1.28-1.69-1.28-1.69-1.05-.72.08-.71.08-.71 1.16.08 1.77 1.19 1.77 1.19 1.03 1.77 2.71 1.26 3.37.97.1-.75.41-1.26.74-1.55-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.47.11-3.06 0 0 .97-.31 3.19 1.18a11.1 11.1 0 0 1 5.8 0c2.22-1.49 3.18-1.18 3.18-1.18.64 1.59.24 2.77.12 3.06.74.81 1.19 1.84 1.19 3.1 0 4.42-2.69 5.39-5.26 5.68.42.36.79 1.08.79 2.17 0 1.57-.01 2.84-.01 3.22 0 .31.2.67.8.56A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z"/>
            </svg>
            GitHub
          </a>
          <button class="action-btn fold" id="detailFoldButton" type="button">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
              <path d="M7.41 15.59 12 11l4.59 4.59L18 14.17l-6-6-6 6z"/>
            </svg>
            접기
          </button>
        </div>
      </article>
    </section>
  </main>
  <script src="assets/js/projects.js"></script>
</body>
</html>
